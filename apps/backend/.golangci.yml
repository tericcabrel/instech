version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - govet
    - ineffassign
    - misspell
    - noctx
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unused
  settings:
    govet:
      enable-all: true
    revive:
      rules:
        - name: "exported"
          disabled: true
  exclusions:
    paths:
      - db/queries
