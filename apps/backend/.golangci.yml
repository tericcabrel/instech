version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - intrange
    - makezero
    - misspell
    - mnd
    - modernize
    - nestif
    - nlreturn
    - noctx
    - prealloc
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - testpackage
    - thelper
    - unconvert
    - unparam
    - unused
  settings:
    govet:
      enable-all: true
    revive:
      rules:
        - name: "exported"
          disabled: true
  exclusions:
    paths:
      - db/queries
    rules:
      - path: _test\.go
        linters:
          - gocyclo
formatters:
  enable:
    - gofmt
    - goimports