all: false
dir: testutil
filename: testmocks.go
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: false
log-level: debug
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: testutil
recursive: false
require-template-schema-exists: true
template: testify
#template-schema: '{{.Template}}.schema.json'
packages:
  tericcabrel/instech/internal/repository:
    config:
      all: true
    interfaces:
      ToolRepositoryInterface:
      RelationshipRepositoryInterface:
